<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0ede6;
    --muted: #666;
    --danger: #ff4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 40px 24px 80px;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  header {
    max-width: 900px;
    margin: 0 auto 60px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .header-left h1 span {
    color: var(--accent);
    font-style: italic;
  }

  .header-left p {
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .add-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 22px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    margin-top: 6px;
  }

  .add-btn:hover {
    background: #fff;
    transform: translateY(-1px);
  }

  /* Timer grid */
  #timers {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    gap: 2px;
  }

  .timer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 32px 36px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 20px;
    align-items: center;
    animation: slideIn 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .timer-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.4s ease;
  }

  .timer-card:hover::before { transform: scaleY(1); }

  .timer-card.urgent::before { background: var(--danger); transform: scaleY(1); }
  .timer-card.urgent { border-color: rgba(255,68,68,0.3); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .timer-label {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 300;
    font-style: italic;
    color: var(--text);
    margin-bottom: 6px;
  }

  .timer-meta {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .timer-display {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .time-unit {
    text-align: center;
    min-width: 56px;
  }

  .time-num {
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }

  .timer-card.urgent .time-num { color: var(--danger); }

  .time-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .sep {
    font-size: 1.6rem;
    color: var(--border);
    font-weight: 300;
    margin-bottom: 12px;
    align-self: flex-start;
    padding-top: 2px;
  }

  .delete-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px 8px;
    transition: color 0.15s;
    font-family: 'DM Mono', monospace;
  }

  .delete-btn:hover { color: var(--danger); }

  /* Done state */
  .timer-card.done .time-num { color: var(--accent2); }
  .timer-card.done::before { background: var(--accent2); transform: scaleY(1); }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
  }

  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 40px;
    width: min(480px, 90vw);
    animation: slideIn 0.2s ease;
  }

  .modal h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 300;
    font-style: italic;
    margin-bottom: 28px;
  }

  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 32px;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    flex: 1;
    transition: background 0.15s;
  }

  .btn-primary:hover { background: #fff; }

  .btn-cancel {
    background: none;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 12px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .btn-cancel:hover { color: var(--text); border-color: var(--muted); }

  .empty-state {
    max-width: 900px;
    margin: 0 auto;
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
  }

  .empty-state p { font-size: 0.85rem; letter-spacing: 0.05em; }
  .empty-state .big { font-family: 'Fraunces', serif; font-size: 3rem; font-style: italic; font-weight: 300; color: var(--border); margin-bottom: 16px; }

  .progress-bar {
    height: 2px;
    background: var(--border);
    margin-top: 16px;
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 1s linear;
  }

  .timer-card.urgent .progress-fill { background: var(--danger); }
  .timer-card.done .progress-fill { background: var(--accent2); }

  @media (max-width: 600px) {
    .timer-card { grid-template-columns: 1fr; }
    .timer-display { justify-content: flex-start; }
    .time-unit { min-width: 48px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Project <span>Countdown</span></h1>
    <p id="subtitle">Track your milestones</p>
  </div>
  <button class="add-btn" onclick="openModal()">+ Add Timer</button>
</header>

<div id="timers"></div>
<div id="empty" class="empty-state" style="display:none">
  <div class="big">No timers yet</div>
  <p>Add your first countdown to get started</p>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal" onclick="closeIfBg(event)">
  <div class="modal">
    <h2>New Countdown</h2>
    <div class="field">
      <label>Timer Name</label>
      <input type="text" id="inp-name" placeholder="e.g. Design Handoff" maxlength="60">
    </div>
    <div class="field">
      <label>Target Date & Time</label>
      <input type="datetime-local" id="inp-date">
    </div>
    <div class="field">
      <label>Project / Group (optional)</label>
      <input type="text" id="inp-group" placeholder="e.g. Phase 1" maxlength="40">
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="addTimer()">Add Timer</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  let timers = JSON.parse(localStorage.getItem('cdtimers') || '[]');

  function save() {
    localStorage.setItem('cdtimers', JSON.stringify(timers));
  }

  function openModal() {
    // Default to tomorrow
    const d = new Date();
    d.setDate(d.getDate() + 1);
    d.setSeconds(0, 0);
    document.getElementById('inp-date').value = d.toISOString().slice(0,16);
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-group').value = '';
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('inp-name').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function closeIfBg(e) {
    if (e.target.id === 'modal') closeModal();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function addTimer() {
    const name = document.getElementById('inp-name').value.trim();
    const date = document.getElementById('inp-date').value;
    const group = document.getElementById('inp-group').value.trim();
    if (!name || !date) {
      document.getElementById(name ? 'inp-date' : 'inp-name').style.borderColor = '#ff4444';
      setTimeout(() => {
        document.getElementById('inp-name').style.borderColor = '';
        document.getElementById('inp-date').style.borderColor = '';
      }, 1000);
      return;
    }
    timers.push({ id: Date.now(), name, date, group, created: new Date().toISOString() });
    timers.sort((a, b) => new Date(a.date) - new Date(b.date));
    save();
    render();
    closeModal();
  }

  function deleteTimer(id) {
    timers = timers.filter(t => t.id !== id);
    save();
    render();
  }

  function getCountdown(dateStr) {
    const target = new Date(dateStr);
    const now = new Date();
    let diff = target - now;
    if (diff <= 0) return { done: true, d: 0, h: 0, m: 0, s: 0, pct: 100 };
    const d = Math.floor(diff / 86400000);
    diff -= d * 86400000;
    const h = Math.floor(diff / 3600000);
    diff -= h * 3600000;
    const m = Math.floor(diff / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    return { done: false, d, h, m, s };
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function render() {
    const container = document.getElementById('timers');
    const empty = document.getElementById('empty');

    if (timers.length === 0) {
      container.innerHTML = '';
      empty.style.display = 'block';
      document.getElementById('subtitle').textContent = 'Track your milestones';
      return;
    }

    empty.style.display = 'none';

    // Update subtitle
    const next = timers.find(t => new Date(t.date) > new Date());
    if (next) {
      document.getElementById('subtitle').textContent = `${timers.length} milestone${timers.length > 1 ? 's' : ''} tracked`;
    }

    // Build or update cards
    timers.forEach(timer => {
      const cd = getCountdown(timer.date);
      const urgent = !cd.done && cd.d < 2;
      const existing = document.getElementById('tc-' + timer.id);

      const dateStr = new Date(timer.date).toLocaleDateString('en-NZ', {
        weekday: 'short', day: 'numeric', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });

      if (existing) {
        // Update nums only
        existing.querySelector('.n-d').textContent = cd.done ? '—' : pad(cd.d);
        existing.querySelector('.n-h').textContent = cd.done ? '—' : pad(cd.h);
        existing.querySelector('.n-m').textContent = cd.done ? '—' : pad(cd.m);
        existing.querySelector('.n-s').textContent = cd.done ? '—' : pad(cd.s);
        existing.className = 'timer-card' + (cd.done ? ' done' : urgent ? ' urgent' : '');
      } else {
        const card = document.createElement('div');
        card.className = 'timer-card' + (cd.done ? ' done' : urgent ? ' urgent' : '');
        card.id = 'tc-' + timer.id;
        card.innerHTML = `
          <button class="delete-btn" onclick="deleteTimer(${timer.id})" title="Remove">✕</button>
          <div>
            <div class="timer-label">${timer.name}</div>
            <div class="timer-meta">${timer.group ? timer.group + ' · ' : ''}${dateStr}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
          </div>
          <div class="timer-display">
            <div class="time-unit"><div class="time-num n-d">${cd.done ? '—' : pad(cd.d)}</div><div class="time-label">days</div></div>
            <div class="sep">:</div>
            <div class="time-unit"><div class="time-num n-h">${cd.done ? '—' : pad(cd.h)}</div><div class="time-label">hrs</div></div>
            <div class="sep">:</div>
            <div class="time-unit"><div class="time-num n-m">${cd.done ? '—' : pad(cd.m)}</div><div class="time-label">min</div></div>
            <div class="sep">:</div>
            <div class="time-unit"><div class="time-num n-s">${cd.done ? '—' : pad(cd.s)}</div><div class="time-label">sec</div></div>
          </div>
        `;
        if (cd.done) card.querySelector('.timer-display').innerHTML = `<div style="font-family:'Fraunces',serif;font-style:italic;font-size:1.3rem;color:var(--accent2)">Complete ✓</div>`;
        container.appendChild(card);
      }
    });

    // Remove deleted
    container.querySelectorAll('.timer-card').forEach(card => {
      const id = parseInt(card.id.replace('tc-', ''));
      if (!timers.find(t => t.id === id)) card.remove();
    });
  }

  render();
  setInterval(render, 1000);
</script>
</body>
</html>
